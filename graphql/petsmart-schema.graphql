# PetSmart Conceptual GraphQL Schema
# Derived from public website, services, and app feature set.
# PetSmart does not publish a public GraphQL API.

# ─── Enums ───────────────────────────────────────────────────────────────────

enum PetType {
  DOG
  CAT
  BIRD
  FISH
  REPTILE
  SMALL_PET
  LIVESTOCK
  OTHER
}

enum SpeciesType {
  CANINE
  FELINE
  AVIAN
  AQUATIC
  REPTILE
  RODENT
  RABBIT
  FERRET
  OTHER
}

enum OrderStatusType {
  PENDING
  CONFIRMED
  PROCESSING
  SHIPPED
  OUT_FOR_DELIVERY
  DELIVERED
  CANCELLED
  RETURNED
  REFUNDED
}

enum AppointmentStatus {
  REQUESTED
  CONFIRMED
  IN_PROGRESS
  COMPLETED
  CANCELLED
  NO_SHOW
}

enum StoreServiceType {
  GROOMING
  TRAINING
  PET_HOTEL
  DAY_PET_CARE
  BANFIELD_VET
  ADOPTION
  AQUATICS
}

enum GroomingServiceType {
  BATH_AND_BRUSH
  FULL_GROOM
  NAIL_TRIM
  TEETH_BRUSHING
  EAR_CLEANING
  DE_SHED
  PUPPY_FIRST_GROOM
}

enum TrainingClassType {
  PUPPY
  BEGINNER
  INTERMEDIATE
  ADVANCED
  PRIVATE_LESSON
  BEHAVIOR_CONSULTATION
}

enum ShippingMethod {
  STANDARD
  EXPEDITED
  OVERNIGHT
  STORE_PICKUP
  CURBSIDE_PICKUP
  SAME_DAY
}

enum TokenType {
  BEARER
  API_KEY
}

# ─── Scalars ─────────────────────────────────────────────────────────────────

scalar DateTime
scalar Date
scalar URL
scalar JSON

# ─── Store Domain ─────────────────────────────────────────────────────────────

type Store {
  id: ID!
  storeNumber: String!
  name: String!
  address: Address!
  phone: String
  email: String
  hours: [StoreHours!]!
  services: StoreServices!
  details: StoreDetails
  location: StoreLocation!
  isOpen: Boolean!
  timezone: String
}

type StoreDetails {
  storeId: ID!
  squareFootage: Int
  parkingAvailable: Boolean
  wheelchairAccessible: Boolean
  hasGrooming: Boolean!
  hasPetHotel: Boolean!
  hasTraining: Boolean!
  hasBanfield: Boolean!
  hasDayPetCare: Boolean!
  hasAdoption: Boolean!
  hasAquatics: Boolean!
  openedDate: Date
  renovatedDate: Date
  manager: String
}

type StoreHours {
  dayOfWeek: String!
  openTime: String
  closeTime: String
  isClosed: Boolean!
  isHoliday: Boolean
  holidayName: String
}

type StoreServices {
  storeId: ID!
  grooming: Grooming
  petHotel: PetHotel
  training: Training
  vetClinic: VetClinic
  dayPetCare: DayPetCare
  adoptionCenter: Boolean!
  aquaticsCenter: Boolean!
}

type StoreLocation {
  latitude: Float!
  longitude: Float!
  distanceMiles: Float
}

