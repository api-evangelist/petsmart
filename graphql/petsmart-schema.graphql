# ─── Root Types ───────────────────────────────────────────────────────────────

type Query {
  store(id: ID!): Store
  stores(zip: String, radius: Int, services: [StoreServiceType]): [Store!]!
  product(id: ID!): Product
  products(category: String, brand: String, petType: PetType, limit: Int, offset: Int): [Product!]!
  petFood(productId: ID!): PetFood
  pet(id: ID!): Pet
  petParent(id: ID!): PetParent
  appointments(petParentId: ID!, upcoming: Boolean): [Appointment!]!
  adoptionEvents(zip: String, radius: Int): [AdoptionEvent!]!
  rescuedAnimals(species: SpeciesType, zip: String, storeId: ID): [RescuedAnimal!]!
  order(id: ID!): Order
  orders(petParentId: ID!, status: OrderStatusType): [Order!]!
  promotions(petParentId: ID): [Promotion!]!
  deals(petType: PetType, category: String): [Deal!]!
  treatPoints(petParentId: ID!): TreatPoints
  species: [Species!]!
  breeds(speciesId: ID!): [Breed!]!
}

type Mutation {
  createPetProfile(petParentId: ID!, input: PetProfileInput!): Pet!
  updatePetProfile(id: ID!, input: PetProfileInput!): Pet!
  deletePetProfile(id: ID!): Boolean!
  addVaccinationRecord(petId: ID!, input: VaccinationRecordInput!): VaccinationRecord!
  bookGroomingAppointment(input: GroomingAppointmentInput!): GroomingAppointment!
  bookHotelReservation(input: HotelBookingInput!): HotelBooking!
  enrollTrainingClass(input: TrainingClassInput!): Appointment!
  scheduleVetAppointment(input: VetAppointmentInput!): VetAppointment!
  cancelAppointment(id: ID!, reason: String): Appointment!
  addToCart(productId: ID!, quantity: Int!, petParentId: ID!): Order!
  placeOrder(input: OrderInput!): Order!
  cancelOrder(id: ID!, reason: String): Order!
  redeemPoints(petParentId: ID!, points: Int!, orderId: ID): RewardPoints!
  createAPIKey(name: String!, scopes: [String!]!): APIKey!
  revokeAPIKey(id: ID!): Boolean!
  generateToken(apiKeyId: ID!): Token!
}
